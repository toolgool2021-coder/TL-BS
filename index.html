<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TL BS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #004dc0; font-family: 'Arial Black', sans-serif; overflow: hidden; color: white; touch-action: none; width: 100vw; height: 100vh; }
        canvas { display: block; width: 100vw; height: 100vh; background: #2e7d32; }
        #menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #004dc0, #0066ff); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        #menu.hidden { display: none; }
        #menu h1 { font-size: 48px; color: #ffff00; margin: 20px; text-shadow: 3px 3px 6px rgba(0,0,0,0.8); }
        input { padding: 12px; font-size: 16px; width: 300px; margin: 10px; border-radius: 8px; border: 3px solid #ffff00; background: rgba(255,255,255,0.95); color: #000; font-weight: bold; }
        button { padding: 12px 30px; font-size: 16px; margin: 10px; background: #00ff00; color: #000; border: 3px solid #000; border-radius: 8px; cursor: pointer; font-weight: bold; box-shadow: 0 4px #00cc00; }
        button:active { transform: translateY(4px); box-shadow: none; }
        .brawler-list { color: #ffff00; font-size: 11px; margin: 15px 0; text-align: left; max-height: 100px; overflow-y: auto; background: rgba(0,0,0,0.5); padding: 8px; border-radius: 8px; border: 2px solid #ffff00; width: 350px; }
        #status { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.9); padding: 10px 15px; border-radius: 8px; border: 2px solid #00ff00; font-size: 12px; z-index: 50; color: #00ff00; }
        #stats { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.9); padding: 10px; border-radius: 8px; border: 2px solid #ff00ff; font-size: 11px; z-index: 50; color: #00ff00; }
        .bar { width: 150px; height: 14px; background: #333; border: 2px solid white; border-radius: 4px; margin: 3px 0; overflow: hidden; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, #00ff00, #ffff00); }
        .bar-fill.enemy { background: linear-gradient(90deg, #ff0000, #ff6600); }
        #controls { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); padding: 10px 15px; border-radius: 10px; z-index: 50; border: 2px solid #00ffff; text-align: center; font-size: 10px; }
    </style>
</head>
<body>

<div id="menu">
    <h1>⚔️ TL BS ⚔️</h1>
    <label style="color: #ffff00; font-size: 14px;">Выберите бойца:</label>
    <input type="text" id="brawler" placeholder="Colt" value="Colt">
    <div class="brawler-list">
        Shelly, Colt, El_Primo, Barley, Brock, Dynamike, Mortis, Stu, Darryl, Nani, Max, Crow, Tara, Gene, Bibi, Bull, Jessie, Bo, Tick, Rosa
    </div>
    <button onclick="startGame()">▶️ ИГРАТЬ</button>
</div>

<div id="status">⏳ Готово</div>
<div id="stats">
    <div style="color: #00ff00;"><b>👤 ИГРОК</b></div>
    <div id="pname" style="color: #ffaa00; font-size: 10px;">-</div>
    <div class="bar"><div class="bar-fill" id="hp1" style="width: 100%"></div></div>
    <div style="margin-top: 10px; color: #ff00ff;"><b>👹 ВРАГ</b></div>
    <div id="ename" style="color: #ff6666; font-size: 10px;">-</div>
    <div class="bar"><div class="bar-fill enemy" id="hp2" style="width: 100%"></div></div>
</div>
<div id="controls">👆 ЛЕВЫЙ СВАЙП = ДВИЖЕНИЕ | 👆 ПРАВЫЙ СВАЙП = АТАКА | 🎯 КЛИК = АТАКА</div>

<canvas id="gameCanvas"></canvas>

<script>
    const BRAWLERS = {
        Shelly: { color: '#bc42f5', speed: 4, maxHp: 4200, dmg: 400 },
        Colt: { color: '#f54242', speed: 4.5, maxHp: 3600, dmg: 380 },
        El_Primo: { color: '#3498db', speed: 3.5, maxHp: 5500, dmg: 450 },
        Barley: { color: '#95a5a6', speed: 3.8, maxHp: 3000, dmg: 360 },
        Brock: { color: '#34495e', speed: 4, maxHp: 3200, dmg: 420 },
        Dynamike: { color: '#e67e22', speed: 3.8, maxHp: 3400, dmg: 440 },
        Mortis: { color: '#8e44ad', speed: 4.8, maxHp: 3600, dmg: 380 },
        Stu: { color: '#e74c3c', speed: 4.5, maxHp: 3200, dmg: 360 },
        Darryl: { color: '#7f8c8d', speed: 4, maxHp: 4000, dmg: 410 },
        Nani: { color: '#f1c40f', speed: 3.9, maxHp: 3200, dmg: 390 },
        Max: { color: '#ffeb3b', speed: 5.5, maxHp: 3200, dmg: 340 },
        Crow: { color: '#2ecc71', speed: 5.2, maxHp: 3200, dmg: 370 },
        Tara: { color: '#e91e63', speed: 4, maxHp: 3600, dmg: 380 },
        Gene: { color: '#9c27b0', speed: 4, maxHp: 3400, dmg: 360 },
        Bibi: { color: '#3f51b5', speed: 4.5, maxHp: 4200, dmg: 430 },
        Bull: { color: '#5d4037', speed: 4, maxHp: 4800, dmg: 420 },
        Jessie: { color: '#ff5722', speed: 4, maxHp: 3200, dmg: 360 },
        Bo: { color: '#2e7d32', speed: 4, maxHp: 3400, dmg: 390 },
        Tick: { color: '#455a64', speed: 3.5, maxHp: 3200, dmg: 350 },
        Rosa: { color: '#4caf50', speed: 4, maxHp: 4600, dmg: 410 }
    };

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const menu = document.getElementById('menu');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let gameActive = false;
    let p = { x: canvas.width/2 - 100, y: canvas.height - 100, hp: 4200, maxHp: 4200, br: 'Colt' };
    let e = { x: canvas.width/2 + 100, y: 100, hp: 4200, maxHp: 4200, br: 'Shelly' };
    let bullets = [];
    let joyL = { x: 100, y: canvas.height - 100, active: false, cx: 100, cy: 0 };
    let joyR = { x: canvas.width - 100, y: canvas.height - 100, active: false, cx: 0, cy: 0 };

    window.startGame = function() {
        let b = document.getElementById('brawler').value.trim();
        if(!b || !BRAWLERS[b]) { alert('❌ Неверное имя!'); return; }
        
        p.br = b;
        p.maxHp = BRAWLERS[b].maxHp;
        p.hp = p.maxHp;
        e.br = Object.keys(BRAWLERS)[Math.floor(Math.random() * Object.keys(BRAWLERS).length)];
        e.maxHp = BRAWLERS[e.br].maxHp;
        e.hp = e.maxHp;

        menu.classList.add('hidden');
        document.getElementById('pname').innerText = p.br;
        document.getElementById('ename').innerText = e.br;

        gameActive = true;
        requestAnimationFrame(update);
    };

    function spawnBullet(angle) {
        for(let i = -0.2; i <= 0.2; i += 0.2) {
            bullets.push({
                x: p.x, y: p.y,
                vx: Math.cos(angle + i) * 10,
                vy: Math.sin(angle + i) * 10,
                life: 100
            });
        }
    }

    canvas.addEventListener('touchstart', e => {
        for(let t of e.touches) {
            if(t.clientX < canvas.width/2) {
                joyL.active = true;
                joyL.cx = t.clientX;
                joyL.cy = t.clientY;
            } else {
                joyR.active = true;
                joyR.cx = t.clientX;
                joyR.cy = t.clientY;
            }
        }
    }, false);

    canvas.addEventListener('touchmove', e => {
        for(let t of e.touches) {
            if(joyL.active) { joyL.cx = t.clientX; joyL.cy = t.clientY; }
            if(joyR.active) { joyR.cx = t.clientX; joyR.cy = t.clientY; }
        }
    }, false);

    canvas.addEventListener('touchend', e => {
        if(joyL.active) joyL.active = false;
        if(joyR.active) {
            let dx = joyR.cx - joyR.x, dy = joyR.cy - joyR.y;
            if(Math.hypot(dx, dy) > 40) spawnBullet(Math.atan2(dy, dx));
            joyR.active = false;
        }
    }, false);

    canvas.addEventListener('click', e => {
        if(gameActive) spawnBullet(Math.atan2(e.clientY - p.y, e.clientX - p.x));
    });

    function update() {
        if(!gameActive) return;

        let stats = BRAWLERS[p.br];
        
        // Движение
        if(joyL.active) {
            let dx = joyL.cx - joyL.x, dy = joyL.cy - joyL.y;
            let dist = Math.hypot(dx, dy);
            if(dist > 10) {
                p.x += (dx/dist) * stats.speed;
                p.y += (dy/dist) * stats.speed;
            }
        }

        p.x = Math.max(40, Math.min(canvas.width - 40, p.x));
        p.y = Math.max(40, Math.min(canvas.height - 40, p.y));

        // Пули
        bullets.forEach((b, i) => {
            b.x += b.vx;
            b.y += b.vy;
            b.life--;
            
            if(b.life <= 0 || b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
                bullets.splice(i, 1);
            }
            
            if(Math.hypot(b.x - e.x, b.y - e.y) < 40) {
                e.hp -= BRAWLERS[p.br].dmg;
                bullets.splice(i, 1);
                if(e.hp <= 0) {
                    gameActive = false;
                    setTimeout(() => {
                        alert('🎉 ВЫ ПОБЕДИЛИ!');
                        location.reload();
                    }, 500);
                }
            }
        });

        // Враг движется
        let dx = p.x - e.x, dy = p.y - e.y;
        let dist = Math.hypot(dx, dy);
        if(dist > 100) {
            e.x += (dx/dist) * BRAWLERS[e.br].speed * 0.8;
            e.y += (dy/dist) * BRAWLERS[e.br].speed * 0.8;
        }

        // Враг стреляет
        if(Math.random() < 0.01) {
            let angle = Math.atan2(p.y - e.y, p.x - e.x);
            for(let i = -0.2; i <= 0.2; i += 0.2) {
                bullets.push({
                    x: e.x, y: e.y,
                    vx: Math.cos(angle + i) * 10,
                    vy: Math.sin(angle + i) * 10,
                    life: 100,
                    isEnemy: true
                });
            }
        }

        // Урон от врага
        bullets.forEach((b, i) => {
            if(b.isEnemy && Math.hypot(b.x - p.x, b.y - p.y) < 40) {
                p.hp -= BRAWLERS[e.br].dmg;
                bullets.splice(i, 1);
                if(p.hp <= 0) {
                    gameActive = false;
                    setTimeout(() => {
                        alert('❌ ВЫ ПРОИГРАЛИ!');
                        location.reload();
                    }, 500);
                }
            }
        });

        document.getElementById('hp1').style.width = (p.hp / p.maxHp * 100) + '%';
        document.getElementById('hp2').style.width = (e.hp / e.maxHp * 100) + '%';

        draw();
        requestAnimationFrame(update);
    }

    function draw() {
        ctx.fillStyle = '#2e7d32';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Пули
        ctx.fillStyle = '#ffff00';
        bullets.forEach(b => {
            ctx.beginPath();
            ctx.arc(b.x, b.y, 6, 0, Math.PI * 2);
            ctx.fill();
        });

        // Враг
        ctx.fillStyle = BRAWLERS[e.br].color;
        ctx.beginPath();
        ctx.arc(e.x, e.y, 32, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#ffff00';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Игрок
        ctx.fillStyle = BRAWLERS[p.br].color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 32, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#00ff00';
        ctx.lineWidth = 3;
        ctx.stroke();

        // Джойстики
        ctx.globalAlpha = 0.15;
        ctx.fillStyle = '#00ff00';
        ctx.beginPath();
        ctx.arc(joyL.x, joyL.y, 80, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ff00ff';
        ctx.beginPath();
        ctx.arc(joyR.x, joyR.y, 80, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }
</script>

</body>
</html>
