<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TL BS - Multiplayer</title>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js"></script>
    <style>
        body { 
            margin: 0; 
            background: #004dc0; 
            font-family: 'Arial Black', sans-serif; 
            overflow: hidden; 
            color: white; 
            touch-action: none; 
        }
        canvas { 
            display: block; 
            background: #2e7d32; 
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        #status { 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            background: rgba(0,0,0,0.8); 
            padding: 15px 20px; 
            border-radius: 8px; 
            z-index: 50;
            font-size: 14px;
            border: 2px solid #00ff00;
        }
        #gameId { 
            position: absolute; 
            top: 70px; 
            left: 10px; 
            background: rgba(0,0,0,0.8); 
            padding: 10px 15px; 
            border-radius: 8px; 
            z-index: 50; 
            font-size: 12px;
            border: 2px solid #ffff00;
            max-width: 250px;
            word-wrap: break-word;
        }
        #playerStats {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 8px;
            z-index: 50;
            border: 2px solid #ff00ff;
        }
        .stat-bar {
            width: 200px;
            height: 20px;
            background: #333;
            border: 2px solid white;
            border-radius: 4px;
            margin: 5px 0;
            overflow: hidden;
        }
        .stat-fill {
            height: 100%;
            background: #00ff00;
            transition: width 0.3s;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 15px 25px;
            border-radius: 12px;
            z-index: 50;
            border: 2px solid #00ffff;
            text-align: center;
            font-size: 12px;
        }
        .pin-display {
            position: absolute;
            font-size: 48px;
            pointer-events: none;
            animation: pinFloat 2s ease-out forwards;
        }
        @keyframes pinFloat {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(0.5); opacity: 0; }
        }
    </style>
</head>
<body>

<div id="ui">
    <div id="status">⏳ Загрузка Firebase...</div>
    <div id="gameId"></div>
    <div id="playerStats">
        <div style="font-weight: bold; margin-bottom: 10px;">ИГРОК</div>
        <div>HP:</div>
        <div class="stat-bar"><div class="stat-fill" id="playerHpBar"></div></div>
        <div>УЛТ:</div>
        <div class="stat-bar"><div class="stat-fill" id="playerUltBar"></div></div>
        <div style="margin-top: 15px; font-weight: bold;">ВРАГ</div>
        <div>HP:</div>
        <div class="stat-bar"><div class="stat-fill" id="enemyHpBar"></div></div>
    </div>
    <div id="controls">
        👆 Свайп влево = ДВИЖЕНИЕ | 👆 Свайп вправо = АТАКА<br>
        🎯 Нажми на врага чтобы атаковать | Убейте друг друга!
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    // Firebase config
    const firebaseConfig = {
        apiKey: "AIzaSyAb2_n8alGnm2v574Yaad2e53kyyHuPaIM",
        authDomain: "tl-bs-5899b.firebaseapp.com",
        projectId: "tl-bs-5899b",
        storageBucket: "tl-bs-5899b.firebasestorage.app",
        messagingSenderId: "300221375469",
        appId: "1:300221375469:web:9cd480c765c7312e223de4",
        databaseURL: "https://tl-bs-5899b-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Персонажи
    const BRAWLERS = {
        Shelly: { color: '#bc42f5', speed: 4, reload: 1500, maxAmmo: 3, maxHp: 4200 },
        Colt: { color: '#f54242', speed: 4.5, reload: 1300, maxAmmo: 3, maxHp: 3600 },
        El_Primo: { color: '#3498db', speed: 3.5, reload: 1000, maxAmmo: 3, maxHp: 5500 },
        Barley: { color: '#95a5a6', speed: 3.8, reload: 1800, maxAmmo: 3, maxHp: 3000 },
        Brock: { color: '#34495e', speed: 4, reload: 2000, maxAmmo: 3, maxHp: 3200 },
        Dynamike: { color: '#e67e22', speed: 3.8, reload: 1800, maxAmmo: 3, maxHp: 3400 },
        Mortis: { color: '#8e44ad', speed: 4.8, reload: 2400, maxAmmo: 3, maxHp: 3600 },
        Stu: { color: '#e74c3c', speed: 4.5, reload: 1400, maxAmmo: 2, maxHp: 3200 },
        Darryl: { color: '#7f8c8d', speed: 4, reload: 1300, maxAmmo: 3, maxHp: 4000 },
        Nani: { color: '#f1c40f', speed: 3.9, reload: 2100, maxAmmo: 3, maxHp: 3200 },
        Max: { color: '#ffeb3b', speed: 5.5, reload: 1100, maxAmmo: 4, maxHp: 3200 },
        Crow: { color: '#2ecc71', speed: 5.2, reload: 1400, maxAmmo: 3, maxHp: 3200 },
        Tara: { color: '#e91e63', speed: 4, reload: 2000, maxAmmo: 3, maxHp: 3600 },
        Gene: { color: '#9c27b0', speed: 4, reload: 1800, maxAmmo: 3, maxHp: 3400 },
        Bibi: { color: '#3f51b5', speed: 4.5, reload: 1200, maxAmmo: 3, maxHp: 4200 },
        Bull: { color: '#5d4037', speed: 4, reload: 1400, maxAmmo: 3, maxHp: 4800 },
        Jessie: { color: '#ff5722', speed: 4, reload: 1800, maxAmmo: 3, maxHp: 3200 },
        Bo: { color: '#2e7d32', speed: 4, reload: 1700, maxAmmo: 3, maxHp: 3400 },
        Tick: { color: '#455a64', speed: 3.5, reload: 2200, maxAmmo: 3, maxHp: 3200 },
        Rosa: { color: '#4caf50', speed: 4, reload: 1000, maxAmmo: 3, maxHp: 4600 }
    };

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const gameIdEl = document.getElementById('gameId');

    let gameId = null;
    let playerId = null;
    let isPlayer1 = false;
    let gameActive = false;

    let p = { 
        x: 0, y: 0, scale: 1, hp: 3600, maxHp: 3600, 
        brawler: 'Colt', ultCharge: 0, ammo: 3, reloadTimer: 0,
        isFlying: false, speedMult: 1
    };
    let enemy = { 
        x: 0, y: 0, hp: 3600, maxHp: 3600, 
        brawler: 'Shelly', ultCharge: 0
    };
    let bullets = [];
    let zones = [];
    let activePin = { type: '', timer: 0, x: 0, y: 0 };
    let enemyPin = { type: '', timer: 0, x: 0, y: 0 };

    let joyL = { active: false, x: 100, y: 0, cx: 100, cy: 0, id: null };
    let joyR = { active: false, x: 0, y: 0, cx: 0, cy: 0, id: null };

    function generateGameId() {
        return 'game_' + Math.random().toString(36).substr(2, 9);
    }

    function selectBrawler() {
        const brawlerList = Object.keys(BRAWLERS).join(', ');
        p.brawler = prompt("Выберите бойца:\n" + brawlerList, "Colt");
        if (!p.brawler || !BRAWLERS[p.brawler]) {
            p.brawler = 'Colt';
        }
        const stats = BRAWLERS[p.brawler];
        p.maxHp = stats.maxHp;
        p.hp = stats.maxHp;
    }

    function joinGame() {
        selectBrawler();
        
        gameId = prompt("Введите ID игры (или оставьте пусто чтобы создать новую):");
        
        if (!gameId || gameId.trim() === "") {
            gameId = generateGameId();
            playerId = 'p1_' + Date.now();
            isPlayer1 = true;
            statusEl.innerText = "⏳ Ожидание второго игрока...\nПередайте ID: " + gameId;
            gameIdEl.innerHTML = `<strong>Скопируйте ID:</strong><br><span style="color:#ffff00; font-weight:bold;">${gameId}</span>`;
            
            db.ref('games/' + gameId).set({
                player1: playerId,
                player1Brawler: p.brawler,
                player1x: 0,
                player1y: 0,
                player1hp: p.maxHp,
                player1ultCharge: 0,
                player2: null,
                player2Brawler: 'Shelly',
                player2x: 0,
                player2y: 0,
                player2hp: BRAWLERS['Shelly'].maxHp,
                player2ultCharge: 0,
                status: 'waiting'
            });

            db.ref('games/' + gameId + '/player2').on('value', (snap) => {
                if (snap.val() && gameActive === false) {
                    db.ref('games/' + gameId).once('value', (gameSnap) => {
                        const gameData = gameSnap.val();
                        enemy.brawler = gameData.player2Brawler || 'Shelly';
                        enemy.maxHp = BRAWLERS[enemy.brawler].maxHp;
                        enemy.hp = enemy.maxHp;
                    });
                    gameActive = true;
                    statusEl.innerText = "▶️ Игра началась!";
                    gameIdEl.innerHTML = "";
                    startGame();
                }
            });
        } else {
            playerId = 'p2_' + Date.now();
            isPlayer1 = false;

            db.ref('games/' + gameId).once('value', (snap) => {
                if (snap.exists()) {
                    const gameData = snap.val();
                    if (gameData.player2) {
                        alert("В этой игре уже два игрока!");
                        location.reload();
                        return;
                    }
                    
                    enemy.brawler = gameData.player1Brawler || 'Shelly';
                    enemy.maxHp = BRAWLERS[enemy.brawler].maxHp;
                    enemy.hp = enemy.maxHp;

                    db.ref('games/' + gameId).update({
                        player2: playerId,
                        player2Brawler: p.brawler,
                        status: 'active'
                    });
                    gameActive = true;
                    statusEl.innerText = "▶️ Игра началась!";
                    gameIdEl.innerHTML = "";
                    startGame();
                } else {
                    alert("Игра не найдена!");
                    location.reload();
                }
            });
        }
    }

    function startGame() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        if (isPlayer1) {
            p.x = canvas.width / 2;
            p.y = canvas.height - 120;
            enemy.x = canvas.width / 2;
            enemy.y = 120;
        } else {
            p.x = canvas.width / 2;
            p.y = 120;
            enemy.x = canvas.width / 2;
            enemy.y = canvas.height - 120;
        }

        joyL.x = 100;
        joyL.y = canvas.height - 120;
        joyR.x = canvas.width - 100;
        joyR.y = canvas.height - 130;

        const playerKey = isPlayer1 ? 'player1' : 'player2';
        const playerXKey = isPlayer1 ? 'player1x' : 'player2x';
        const playerYKey = isPlayer1 ? 'player1y' : 'player2y';
        const playerHpKey = isPlayer1 ? 'player1hp' : 'player2hp';
        const playerUltKey = isPlayer1 ? 'player1ultCharge' : 'player2ultCharge';

        // Синхронизируем каждые 50мс
        setInterval(() => {
            if (gameActive) {
                db.ref('games/' + gameId).update({
                    [playerXKey]: Math.round(p.x),
                    [playerYKey]: Math.round(p.y),
                    [playerHpKey]: Math.round(p.hp),
                    [playerUltKey]: Math.round(p.ultCharge)
                });
            }
        }, 50);

        // Получаем данные врага
        const enemyXKey = isPlayer1 ? 'player2x' : 'player1x';
        const enemyYKey = isPlayer1 ? 'player2y' : 'player1y';
        const enemyHpKey = isPlayer1 ? 'player2hp' : 'player1hp';
        const enemyUltKey = isPlayer1 ? 'player2ultCharge' : 'player1ultCharge';

        db.ref('games/' + gameId).on('value', (snap) => {
            if (snap.val()) {
                const gameData = snap.val();
                enemy.x = gameData[enemyXKey] || enemy.x;
                enemy.y = gameData[enemyYKey] || enemy.y;
                enemy.hp = gameData[enemyHpKey] || enemy.hp;
                enemy.ultCharge = gameData[enemyUltKey] || 0;
            }
        });

        requestAnimationFrame(update);
    }

    function attack(angle, isUlt = false) {
        const stats = BRAWLERS[p.brawler];
        
        if (isUlt && p.ultCharge >= 100) {
            p.ultCharge = 0;
            useUltimate(angle);
            return;
        }

        if (!isUlt && p.ammo >= 1 && p.reloadTimer <= 0) {
            p.ammo -= 1;
            p.reloadTimer = stats.reload;

            switch(p.brawler) {
                case 'Shelly':
                    for(let i=-1; i<=1; i++) spawnBullet(angle+i*0.2, 12, 35);
                    break;
                case 'Colt':
                    for(let i=0; i<5; i++) 
                        setTimeout(()=>spawnBullet(angle, 15, 45), i*80);
                    break;
                case 'El_Primo':
                case 'Rosa':
                    for(let i=0; i<3; i++) 
                        setTimeout(()=>spawnBullet(angle, 10, 8), i*80);
                    break;
                case 'Brock':
                    spawnBullet(angle, 14, 60);
                    break;
                case 'Barley':
                    spawnBarleyBottle(angle, 200, 'fire');
                    break;
                case 'Dynamike':
                    spawnBarleyBottle(angle, 250, 'boom');
                    break;
                case 'Tick':
                    for(let i=-1; i<=1; i++) 
                        spawnBarleyBottle(angle+i*0.2, 220, 'mine');
                    break;
                case 'Bo':
                    for(let i=-1; i<=1; i++) 
                        setTimeout(()=>spawnBullet(angle+i*0.1, 13, 45), i*100+100);
                    break;
                case 'Jessie':
                    spawnBullet(angle, 12, 55, false, 8, 'energy');
                    break;
                case 'Mortis':
                    p.x += Math.cos(angle)*130;
                    p.y += Math.sin(angle)*130;
                    if(Math.hypot(p.x-enemy.x, p.y-enemy.y)<60) hitEnemy(900);
                    break;
                case 'Stu':
                    spawnBullet(angle, 16, 30);
                    setTimeout(()=>spawnBullet(angle, 16, 30), 100);
                    break;
                case 'Darryl':
                case 'Bull':
                    for(let i=-2; i<=2; i++) spawnBullet(angle+i*0.15, 13, 25);
                    break;
                case 'Crow':
                    for(let i=-1; i<=1; i++) spawnBullet(angle+i*0.3, 14, 40);
                    break;
                case 'Max':
                    for(let i=0; i<4; i++) 
                        setTimeout(()=>spawnBullet(angle, 18, 35), i*50);
                    break;
                case 'Tara':
                    for(let i=-1; i<=1; i++) spawnBullet(angle+i*0.15, 13, 40);
                    break;
                case 'Gene':
                    spawnBullet(angle, 11, 25, false, 10, 'gene_main');
                    break;
                case 'Bibi':
                    if(Math.hypot(p.x-enemy.x, p.y-enemy.y)<130) {
                        let diff = Math.atan2(enemy.y-p.y, enemy.x-p.x) - angle;
                        while(diff > Math.PI) diff -= Math.PI*2;
                        while(diff < -Math.PI) diff += Math.PI*2;
                        if(Math.abs(diff) < 0.6) {
                            hitEnemy(1300);
                            enemy.x += Math.cos(angle)*80;
                            enemy.y += Math.sin(angle)*80;
                        }
                    }
                    break;
                case 'Nani':
                    spawnNaniProjectiles(angle);
                    break;
                default:
                    spawnBullet(angle, 12, 40);
            }

            p.ultCharge += 15;
        }
    }

    function useUltimate(angle) {
        switch(p.brawler) {
            case 'Shelly':
                for(let i=-4; i<=4; i++) spawnBullet(angle+i*0.15, 16, 40, true);
                break;
            case 'Colt':
                for(let i=0; i<12; i++) 
                    setTimeout(()=>spawnBullet(angle, 20, 60, true), i*50);
                break;
            case 'Max':
                p.speedMult = 1.6;
                setTimeout(() => p.speedMult = 1, 4000);
                break;
            case 'Rosa':
                zones.push({x: p.x, y: p.y, r: 80, life: 300, type:'shield'});
                break;
            case 'El_Primo':
                p.isFlying = true;
                p.scale = 2.2;
                let jx = p.x + Math.cos(angle)*250;
                let jy = p.y + Math.sin(angle)*250;
                let c = 0;
                let fly = setInterval(()=>{
                    p.x += (jx-p.x)/5;
                    p.y += (jy-p.y)/5;
                    if(++c>=20){
                        clearInterval(fly);
                        p.isFlying = false;
                        p.scale = 1;
                        if(Math.hypot(p.x-enemy.x, p.y-enemy.y)<120) hitEnemy(1800);
                    }
                }, 25);
                break;
            case 'Jessie':
                zones.push({x: p.x+Math.cos(angle)*150, y: p.y+Math.sin(angle)*150, r:60, life:300, type:'turret'});
                break;
            case 'Bo':
                for(let i=-1; i<=1; i++) {
                    let tx=p.x+Math.cos(angle+i*0.4)*200;
                    let ty=p.y+Math.sin(angle+i*0.4)*200;
                    zones.push({x:tx, y:ty, r:50, life:500, type:'mine'});
                }
                break;
            case 'Frank':
                zones.push({x: p.x+Math.cos(angle)*180, y: p.y+Math.sin(angle)*180, r:150, life:30, type:'stun'});
                break;
            case 'Tara':
                zones.push({x: p.x+Math.cos(angle)*250, y: p.y+Math.sin(angle)*250, r: 100, life: 60, type: 'gravity'});
                break;
            case 'Gene':
                spawnBullet(angle, 18, 40, true, 12, 'pull');
                break;
            case 'Bibi':
                bullets.push({ x:p.x, y:p.y, vx:Math.cos(angle)*10, vy:Math.sin(angle)*10, life:300, type:'bubble', size:15 });
                break;
            case 'Stu':
                p.x += Math.cos(angle)*200;
                p.y += Math.sin(angle)*200;
                break;
            case 'Darryl':
                p.isFlying=true;
                let step=0;
                let f=setInterval(()=>{
                    p.x += Math.cos(angle)*12;
                    p.y += Math.sin(angle)*12;
                    if(Math.hypot(p.x-enemy.x,p.y-enemy.y)<50) hitEnemy(1000);
                    if(++step>25){
                        clearInterval(f);
                        p.isFlying=false;
                    }
                }, 20);
                break;
            case 'Dynamike':
                zones.push({x: p.x+Math.cos(angle)*250, y: p.y+Math.sin(angle)*250, r:140, life:60, type:'boom', isBig:true, isUlt:true});
                break;
        }
    }

    function spawnBullet(angle, speed, life, isUlt = false, size=5, special='') {
        bullets.push({
            x: p.x,
            y: p.y,
            vx: Math.cos(angle)*speed,
            vy: Math.sin(angle)*speed,
            life,
            isUlt,
            size,
            type: 'normal',
            special,
            angle: angle
        });
    }

    function spawnBarleyBottle(angle, dist, type, isUlt = false) {
        let tx=p.x+Math.cos(angle)*dist;
        let ty=p.y+Math.sin(angle)*dist;
        setTimeout(()=>zones.push({
            x:tx,
            y:ty,
            r:type==='fire'?55:80,
            life:type==='fire'?120:40,
            type,
            isUlt
        }), 500);
    }

    function spawnNaniProjectiles(angle) {
        const dist = 320;
        const tx = p.x + Math.cos(angle) * dist;
        const ty = p.y + Math.sin(angle) * dist;
        [0, 45*Math.PI/180, -45*Math.PI/180].forEach(c => 
            bullets.push({ x: p.x, y: p.y, tx, ty, progress: 0, curve: c, type: 'nani' })
        );
    }

    function hitEnemy(dmg) {
        enemy.hp -= dmg;
        if(enemy.hp <= 0) {
            enemy.hp = 0;
            setTimeout(() => {
                alert("🎉 ВЫ ПОБЕДИЛИ!");
                location.reload();
            }, 1000);
        }
        p.ultCharge += 10;
        if(p.ultCharge > 100) p.ultCharge = 100;
    }

    window.addEventListener('touchstart', e => {
        for(let t of e.changedTouches) {
            let tx = t.clientX, ty = t.clientY;
            if(tx < canvas.width/2) {
                joyL.id = t.identifier;
                joyL.active = true;
                joyL.cx = tx;
                joyL.cy = ty;
            } else {
                joyR.id = t.identifier;
                joyR.active = true;
                joyR.cx = tx;
                joyR.cy = ty;
            }
        }
    });

    window.addEventListener('touchmove', e => {
        for(let t of e.touches) {
            if(t.identifier === joyL.id) {
                joyL.cx = t.clientX;
                joyL.cy = t.clientY;
            }
            if(t.identifier === joyR.id) {
                joyR.cx = t.clientX;
                joyR.cy = t.clientY;
            }
        }
    });

    window.addEventListener('touchend', e => {
        for(let t of e.changedTouches) {
            if(t.identifier === joyL.id) {
                joyL.active = false;
            }
            if(t.identifier === joyR.id) {
                let dx = joyR.cx - joyR.x;
                let dy = joyR.cy - joyR.y;
                if(Math.hypot(dx,dy)>30) {
                    attack(Math.atan2(dy,dx), false);
                }
                joyR.active = false;
            }
        }
    });

    // Клик на экран = атака
    canvas.addEventListener('click', (e) => {
        let angle = Math.atan2(e.clientY - p.y, e.clientX - p.x);
        attack(angle, false);
    });

    function update() {
        if(!gameActive) return;

        const stats = BRAWLERS[p.brawler];

        // Перезарядка
        if(p.reloadTimer > 0) p.reloadTimer--;
        if(p.ammo < stats.maxAmmo) p.ammo += 1/(stats.reload/16.6);

        // Движение
        if(joyL.active && !p.isFlying) {
            let dx = joyL.cx - joyL.x;
            let dy = joyL.cy - joyL.y;
            let dist = Math.hypot(dx, dy);
            if(dist > 5) {
                p.x += (dx/dist) * stats.speed * p.speedMult;
                p.y += (dy/dist) * stats.speed * p.speedMult;
            }
        }

        // Границы карты
        p.x = Math.max(30, Math.min(canvas.width-30, p.x));
        p.y = Math.max(30, Math.min(canvas.height-30, p.y));

        // Обновляем пины
        [activePin, enemyPin].forEach(pin => {
            if(pin.timer > 0) pin.timer--;
        });

        // Обновляем пули
        bullets.forEach((b, i) => {
            if(b.type === 'nani') {
                b.progress += 0.035;
                let ang = Math.atan2(b.ty - b.y, b.tx - b.x);
                let offX = Math.cos(ang + 1.57) * Math.sin(b.progress * Math.PI) * b.curve;
                let offY = Math.sin(ang + 1.57) * Math.sin(b.progress * Math.PI) * b.curve;
                b.x = p.x + (b.tx - p.x) * b.progress + offX;
                b.y = p.y + (b.ty - p.y) * b.progress + offY;
                if(b.progress >= 1) bullets.splice(i, 1);
            } else {
                b.x += b.vx;
                b.y += b.vy;
                if(--b.life <= 0) {
                    if(b.special === 'gene_main') {
                        for(let j=-1; j<=1; j++) {
                            spawnBullet(b.angle + j*0.25, 12, 25, false, 5, 'gene_split');
                            bullets[bullets.length-1].x = b.x;
                            bullets[bullets.length-1].y = b.y;
                        }
                    }
                    bullets.splice(i, 1);
                }
                if(b.special === 'bounce') {
                    if(b.x<0 || b.x>canvas.width) b.vx *= -1;
                    if(b.y<0 || b.y>canvas.height) b.vy *= -1;
                }
            }

            // Столкновение с врагом
            if(Math.hypot(b.x-enemy.x, b.y-enemy.y) < 30) {
                if(b.special === 'pull') {
                    enemy.x = p.x;
                    enemy.y = p.y;
                }
                let dmg = 400;
                if(b.special === 'gene_split') dmg = 150;
                hitEnemy(dmg);
                if(b.special !== 'bubble' && b.special !== 'bounce') {
                    bullets.splice(i, 1);
                }
            }
        });

        // Обновляем зоны
        zones.forEach((z, i) => {
            if(z.type === 'gravity') {
                enemy.x += (z.x - enemy.x) * 0.1;
                enemy.y += (z.y - enemy.y) * 0.1;
                if(z.life === 1) hitEnemy(2000);
            }
            if(z.type === 'stun' && Math.hypot(enemy.x-z.x, enemy.y-z.y)<z.r) {
                hitEnemy(10);
            }
            if(z.type === 'mine' && Math.hypot(enemy.x-z.x, enemy.y-z.y)<z.r) {
                hitEnemy(2000);
                zones.splice(i, 1);
            }
            if(z.type === 'turret') {
                if(z.life % 30 === 0) {
                    spawnBullet(Math.atan2(enemy.y-z.y, enemy.x-z.x), 10, 40);
                }
            }
            if(Math.hypot(enemy.x-z.x, enemy.y-z.y)<z.r) {
                hitEnemy(5);
            }
            if(--z.life <= 0) zones.splice(i, 1);
        });

        updateUI();
        draw();
        requestAnimationFrame(update);
    }

    function updateUI() {
        document.getElementById('playerHpBar').style.width = (p.hp/p.maxHp)*100 + '%';
        document.getElementById('playerUltBar').style.width = Math.min(p.ultCharge, 100) + '%';
        document.getElementById('enemyHpBar').style.width = Math.max(0, (enemy.hp/enemy.maxHp)*100) + '%';
    }

    function draw() {
        ctx.fillStyle = "#2e7d32";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Рисуем зоны эффектов
        zones.forEach(z => {
            if(z.type==='gravity') ctx.fillStyle="rgba(0,0,0,0.6)";
            else if(z.type==='mine') ctx.fillStyle="rgba(255,0,0,0.5)";
            else if(z.type==='turret') ctx.fillStyle="rgba(255,87,34,0.6)";
            else if(z.type==='shield') ctx.fillStyle="rgba(0,255,0,0.3)";
            else ctx.fillStyle="rgba(255,255,0,0.4)";
            ctx.beginPath();
            ctx.arc(z.x, z.y, z.r, 0, Math.PI*2);
            ctx.fill();
        });

        // Рисуем пули
        bullets.forEach(b => {
            ctx.fillStyle = b.special==='poison'?"#2ecc71":b.isUlt?"#ff00ff":"white";
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.size||5, 0, Math.PI*2);
            ctx.fill();
        });

        // Рисуем врага
        ctx.fillStyle = BRAWLERS[enemy.brawler].color;
        ctx.beginPath();
        ctx.arc(enemy.x, enemy.y, 25, 0, Math.PI*2);
        ctx.fill();
        ctx.strokeStyle = "white";
        ctx.lineWidth = 2;
        ctx.stroke();

        // Рисуем игрока
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.scale(p.scale, p.scale);
        ctx.fillStyle = BRAWLERS[p.brawler].color;
        ctx.beginPath();
        ctx.arc(0, 0, 25, 0, Math.PI*2);
        ctx.fill();
        ctx.strokeStyle = "yellow";
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.restore();

        // Джойстики (полупрозрачно)
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(joyL.x, joyL.y, 60, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(joyR.x, joyR.y, 60, 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }

    // Запускаем игру
    window.addEventListener('load', joinGame);
</script>
